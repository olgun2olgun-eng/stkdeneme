<!DOCTYPE html>

<head>

<title>Çevrimdışı | SH Danışmanlık</title>
<style>

  .box { background: #fff; border-radius: 16px; padding: 50px 40px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 460px; }

  h1 { color: #1a237e; margin-bottom: 12px; }
  p { color: #555; line-height: 1.7; }
  a { display: inline-block; margin-top: 24px; background: #1a237e; color: #fff; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
  a:hover { background: #0d47a1; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">📡</div>
  <h1>Çevrimdışı Görünüyorsunuz</h1>
  <p>İnternet bağlantınız yok. Bağlantınız düzeldiğinde sayfayı yenileyin veya daha önce ziyaret ettiğiniz sayfalara gidin.</p>
  <a href="/" onclick="location.reload()">Tekrar Dene</a>
</div>
</body>
</html>
